<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Espace employé | Didier.Elo</title>
  <link rel="icon" href="logo.jpeg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="adminBody">
  <header class="adminTop">
    <div class="adminBrand">
      <img src="logo.jpeg" alt="Didier.Elo">
      <div>
        <strong>Espace employé</strong>
        <span id="employeeEmail">Chargement...</span>
      </div>
    </div>
    <a href="historique.html" class="smallBtn ok">Historique</a>
    <button id="logoutBtn" class="smallBtn danger">Déconnexion</button>
  </header>

  <main class="adminMain">
    <section class="adminHero">
      <span class="adminBadge">Mes travaux</span>
      <h1>Travaux assignés</h1>
      <p>Vous voyez seulement les travaux qui vous sont assignés.</p>
    </section>

    <section class="panel">
      <div class="panelHead">
        <div>
          <span class="adminBadge">Liste</span>
          <h2>Mes tâches</h2>
        </div>
        <button id="refreshTasks" class="smallBtn">Rafraîchir</button>
      </div>
      <div id="tasksList" class="cardsList"></div>
    </section>
  </main>

  <script type="module" src="employe.js"></script>
</body>
</html>
