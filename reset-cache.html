<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset</title></head><body style="font-family:Arial;padding:30px"><h1>Reset Didier.Elo</h1><button id="b" style="font-size:22px;padding:16px;border-radius:12px;background:#006bd6;color:#fff;border:0">Nettoyer</button><pre id="o"></pre><script>
document.getElementById("b").onclick=async()=>{const o=document.getElementById("o");try{if("caches"in window){for(const k of await caches.keys())await caches.delete(k)}if("serviceWorker"in navigator){for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister()}localStorage.clear();sessionStorage.clear();o.textContent="OK";setTimeout(()=>location.href="login.html?fresh="+Date.now(),800)}catch(e){o.textContent=e.message}}
</script></body></html>
