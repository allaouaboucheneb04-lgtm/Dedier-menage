<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Test Notifications Didier.Elo</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="adminBody">
<main class="adminMain">
<section class="panel">
<h1>Test Notifications</h1>
<p id="notificationStatus" class="notificationStatus">Connecte-toi d’abord dans admin.html, puis reviens ici et clique le bouton.</p>
<button id="enableNotificationsBtn" class="smallBtn">🔔 Activer notifications</button>
<a href="admin.html" class="smallBtn ok" style="margin-top:12px">Retour admin</a>
</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const status = document.getElementById("notificationStatus");
let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  status.textContent = user ? "Connecté. Clique Activer notifications." : "Non connecté. Va d’abord sur admin.html.";
});

document.getElementById("enableNotificationsBtn").onclick = async () => {
  const mod = await import("./notifications.js");
  await mod.initNotifications(app, db, currentUser, "admin");
};
</script>
</body>
</html>
