<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Invitation employé | Didier.Elo</title>
  <link rel="icon" href="logo.jpeg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="adminBody">
  <main class="loginShell">
    <section class="loginCard">
      <img src="logo.jpeg" alt="Didier.Elo" class="loginLogo">
      <span class="adminBadge">Invitation employé</span>
      <h1>Créer mon accès</h1>
      <p id="inviteInfo">Chargement de l’invitation...</p>

      <form id="inviteSignupForm" class="adminForm" hidden>
        <label>Nom
          <input id="name" required>
        </label>

        <label>Email
          <input id="email" type="email" required readonly>
        </label>

        <label>Mot de passe
          <input id="password" type="password" required minlength="6" placeholder="Minimum 6 caractères">
        </label>

        <button id="createBtn" type="submit">Créer mon compte</button>
        <p id="status" class="adminStatus"></p>
      </form>

      <a href="login.html" class="backHome">J’ai déjà un compte</a>
    </section>
  </main>

  <script type="module" src="invite.js"></script>
</body>
</html>
