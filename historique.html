<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Historique | Didier.Elo</title>
  <link rel="icon" href="logo.jpeg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.jpeg">
  <meta name="theme-color" content="#006bd6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Didier.Elo">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body class="adminBody">
  <header class="adminTop">
    <div class="adminBrand">
      <img src="logo.jpeg" alt="Didier.Elo">
      <div>
        <strong>Historique des travaux</strong>
        <span id="userEmail">Chargement...</span>
      </div>
    </div>
    <div class="topActions">
      <a href="admin.html" id="adminBack" class="smallBtn">Admin</a>
      <a href="employe.html" id="employeeBack" class="smallBtn">Mes tâches</a>
      <button id="logoutBtn" class="smallBtn danger">Déconnexion</button>
    </div>
  </header>

  <main class="adminMain">
    <section class="adminHero">
      <span class="adminBadge">Historique</span>
      <h1>Travaux terminés</h1>
      <p>Quand un employé clique sur <strong>Terminé</strong>, le travail apparaît ici automatiquement.</p>
    </section>

    <section class="panel">
      <div class="panelHead">
        <div>
          <span class="adminBadge">Archive</span>
          <h2>Liste des travaux terminés</h2>
        </div>
        <button id="refreshHistory" class="smallBtn">Rafraîchir</button>
      </div>

      <div id="historyList" class="cardsList"></div>
    </section>
  </main>

  <script type="module" src="historique.js"></script>
<script src="pwa.js"></script>
</body>
</html>
